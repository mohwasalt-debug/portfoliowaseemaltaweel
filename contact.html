<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact - Portfolio</title>
    <link rel="stylesheet" href="../styles/contact.css"> <!-- Lien vers le fichier CSS spécifique à cette page -->
</head>
<body>

    <!-- HEADER avec logo et navigation -->
    <header>
        <div class="logo">
            <img src="../img/logo.png" alt="Logo Altaweel Waseem">
            <span class="brand-text">BE DIFFERENT</span>
        </div>

        <!-- Bouton menu burger pour la navigation mobile -->
        <button class="menu-toggle">&#9776;</button>

        <!-- Menu de navigation principal -->
        <nav>
            <ul class="nav-menu">
                <li class="nav-btn"><a href="about.html">Qui suis-je ?</a></li>
                <li class="nav-btn"><a href="projets-pro.html">Projets Pro</a></li>
                <li class="nav-btn"><a href="projets-perso.html">Projets Perso</a></li>
                <li class="nav-btn accueil"><a href="index.html">Accueil</a></li>
            </ul>
        </nav>
    </header>

    <!-- SECTION CONTACT avec formulaire et infos de contact -->
    <section class="contact-section">
        <h2>Une question ?</h2>
        <p><em>Quoi de mieux que de prendre contact !</em></p>

        <div class="contact-form-info">
            <!-- FORMULAIRE DE CONTACT -->
            <form class="contact-form">
                <div class="input-group">
                    <img src="../img/TEL.png" alt="Téléphone">
                    <input type="text" placeholder="Votre téléphone" required>
                </div>

                <div class="input-group">
                    <img src="../img/email.png" alt="Email">
                    <input type="email" placeholder="Votre email" required>
                </div>

                <div class="input-group">
                    <img src="../img/adresse.png" alt="Adresse">
                    <input type="text" placeholder="Votre adresse" required>
                </div>

                <!-- Bouton d'envoi du formulaire -->
                <button type="submit" class="submit-btn"><em>ENVOYER</em></button>
            </form>

            <!-- SECTION INFORMATIONS DE CONTACT -->
            <div class="contact-info">
                <h3><em>Mes contacts</em></h3>

                <div class="contact-item">
                    <img src="../img/TEL.png" alt="Téléphone">
                    <span>0767788365</span>
                </div>

                <div class="contact-item">
                    <img src="../img/email.png" alt="Email">
                    <span>mohwasalt@gmail.com</span>
                </div>

                <div class="contact-item">
                    <img src="../img/adresse.png" alt="Adresse">
                    <span>17 rue Jeanne d’arc</span>
                </div>
            </div>
        </div>
    </section>

    <!-- PIED DE PAGE avec liens utiles -->
    <footer>
        <ul>
            <li><a href="mentions-legales.html">Mentions légales</a></li>
            <li><a href="plan-du-site.html">Plan du site</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <p>© 2024 - Tous droits réservés.</p>
    </footer>

    <!-- Script pour gérer le menu responsive -->
    <script src="../js/menu.js"></script>

</body>
</html>
