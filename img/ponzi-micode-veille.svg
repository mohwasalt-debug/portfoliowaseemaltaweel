<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Pyramide de Ponzi</title>
  <desc id="desc">Illustration d'une enquete sur une arnaque pyramidale en ligne.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9fbff"/>
      <stop offset=".55" stop-color="#e6f6ff"/>
      <stop offset="1" stop-color="#efe8ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2d55"/>
      <stop offset=".5" stop-color="#ff9500"/>
      <stop offset="1" stop-color="#007aff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#1f2d48" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="48" fill="url(#bg)"/>
  <circle cx="1050" cy="140" r="210" fill="#ff2d55" opacity=".11"/>
  <circle cx="170" cy="610" r="260" fill="#007aff" opacity=".12"/>
  <g filter="url(#shadow)" transform="translate(160 115)">
    <path d="M440 0l420 560H20z" fill="rgba(255,255,255,.72)" stroke="rgba(255,255,255,.9)" stroke-width="3"/>
    <path d="M440 72l99 132H341z" fill="url(#accent)" opacity=".92"/>
    <path d="M326 224h228l98 132H228z" fill="#fff" opacity=".8"/>
    <path d="M214 376h452l98 132H116z" fill="#fff" opacity=".68"/>
    <circle cx="440" cy="148" r="34" fill="#fff"/>
    <circle cx="330" cy="288" r="30" fill="#007aff" opacity=".9"/>
    <circle cx="550" cy="288" r="30" fill="#ff9500" opacity=".9"/>
    <circle cx="236" cy="440" r="28" fill="#ff2d55" opacity=".9"/>
    <circle cx="440" cy="440" r="28" fill="#7b61ff" opacity=".9"/>
    <circle cx="646" cy="440" r="28" fill="#22c6f2" opacity=".9"/>
  </g>
  <text x="116" y="670" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#101418">PONZI</text>
  <text x="285" y="670" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#687382">enquete, faux profils, recrutement</text>
</svg>
