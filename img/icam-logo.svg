<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 190" role="img" aria-labelledby="title desc">
  <title id="title">Logo ICAM</title>
  <desc id="desc">Logo ICAM avec mouvement jaune-orange et texte gris.</desc>
  <defs>
    <linearGradient id="orange" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#f6a400"/>
      <stop offset="1" stop-color="#f08a00"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9d348"/>
      <stop offset="1" stop-color="#e33b22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="360" height="190" rx="26" fill="#ffffff"/>
  <path d="M24 89 C74 126 154 116 196 72 C222 45 236 22 232 0" fill="none" stroke="url(#orange)" stroke-width="13" stroke-linecap="round" filter="url(#shadow)"/>
  <path d="M28 91 C48 99 77 104 106 98" fill="none" stroke="url(#orange)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="104" cy="65" r="21" fill="url(#dot)" filter="url(#shadow)"/>
  <circle cx="104" cy="65" r="11" fill="#a51c1f"/>
  <text x="88" y="160" font-family="Arial, Helvetica, sans-serif" font-size="88" font-style="italic" font-weight="800" fill="#686868">icam</text>
</svg>
