<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 120" role="img" aria-labelledby="title desc">
  <title id="title">Logo Université de Besançon</title>
  <desc id="desc">Badge Université de Besançon et UFR Santé pour la frise du parcours.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f2ecff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b61ff"/>
      <stop offset="1" stop-color="#22c6f2"/>
    </linearGradient>
  </defs>
  <rect width="220" height="120" rx="28" fill="url(#bg)"/>
  <circle cx="58" cy="58" r="28" fill="none" stroke="url(#accent)" stroke-width="8"/>
  <path d="M46 58 H70 M58 46 V70" stroke="#101418" stroke-width="8" stroke-linecap="round"/>
  <text x="96" y="54" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="900" fill="#101418">UFR</text>
  <text x="96" y="80" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="800" fill="#101418">Santé</text>
  <text x="34" y="102" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#687382">Université de Besançon</text>
</svg>
